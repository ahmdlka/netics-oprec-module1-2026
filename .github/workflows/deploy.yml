name: CI/CD API Deployment

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    name: Build Image and Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # Login ke Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build & Push
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./src
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/api-app:latest

      # Deployment via SSH 
      - name: Deploy ke VPS
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            # Pull image terbaru
            docker pull ${{ secrets.DOCKER_USERNAME }}/api-app:latest
            
            # Hapus container lama jika ada
            docker stop api-container || true
            docker rm api-container || true
            
            # Jalankan container di port 8080
            docker run -d \
              --name api-container \
              -p 8080:8080 \
              --restart always \
              ${{ secrets.DOCKER_USERNAME }}/api-app:latest